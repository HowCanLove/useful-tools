<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>OG image</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #0d9488 0%, #155e75 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: white;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15), transparent 45%);
  }
  .badge { position:absolute; top:60px; left:70px; padding:6px 16px; background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); border-radius:999px; font-size:18px; font-weight:500; }
  h1 { position:absolute; top:130px; left:70px; font-size:78px; font-weight:800; letter-spacing:-2px; line-height:1; }
  h1 .emoji { font-size:70px; margin-right:10px; vertical-align:-4px; }
  .tagline { position:absolute; top:240px; left:70px; font-size:28px; font-weight:400; opacity:0.95; line-height:1.35; max-width:1060px; }
  .features { position:absolute; top:360px; left:70px; display:flex; gap:12px; flex-wrap:nowrap; }
  .feature { padding:8px 18px; background:rgba(0,0,0,0.25); border-radius:10px; font-size:19px; font-weight:500; white-space:nowrap; }
  .stats { position:absolute; bottom:60px; left:70px; display:flex; gap:32px; }
  .stat-num { font-size:44px; font-weight:800; line-height:1; letter-spacing:-1px; }
  .stat-lbl { font-size:16px; opacity:0.85; margin-top:4px; }
  .url { position:absolute; bottom:60px; right:70px; font-size:22px; font-weight:600; text-align:right; }
  .url small { display:block; font-size:15px; opacity:0.8; margin-top:4px; font-weight:400; }
</style>
</head>
<body>
  <span class="badge">🧰 Free Web Tools</span>
  <h1><span class="emoji">🧰</span>好工具</h1>
  <p class="tagline">免费在线工具集合 · 打开浏览器就能用<br>按隐私级别（本地处理 vs 云端）和用途分类</p>
  <div class="features">
    <span class="feature">🔒 本地处理</span>
    <span class="feature">☁️ 云端处理</span>
    <span class="feature">🔧 开发</span>
    <span class="feature">📄 PDF</span>
    <span class="feature">🌍 中 / EN / 日</span>
  </div>
  <div class="stats">
    <div><div class="stat-num">33</div><div class="stat-lbl">工具</div></div>
    <div><div class="stat-num">9</div><div class="stat-lbl">分类</div></div>
    <div><div class="stat-num">3</div><div class="stat-lbl">语言</div></div>
  </div>
  <div class="url">
    tools.512347.xyz
    <small>github.com/HowCanLove/useful-tools</small>
  </div>
</body>
</html>
